<h1>{{ config.icon }} {{ config.application_title }}</h1>
<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="section-guide" style="margin-bottom: 20px; border-left: 4px solid #2ecc71; padding-left: 15px;">
            <h3>Step {{ forloop.counter }}: {{ field.label }}</h3>
            <p><i>Enter the details for this BMAD section:</i></p>
            {{ field }}
        </div>
    {% endfor %}
    <button type="submit">Generate BMAD Document</button>
</form>
