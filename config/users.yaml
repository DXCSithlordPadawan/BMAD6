# users.yaml — BMAD v6 Template Architect user accounts
#
# IMPORTANT: Change all default passwords before deploying to production.
# Generate a password hash with:
#   python -c "from werkzeug.security import generate_password_hash; print(generate_password_hash('your_password'))"
#
# Roles: admin, user, security_lead, devops
#   admin         — Full application access including amend/edit
#   user          — Standard access: guide, generate, download, dashboard
#   security_lead — Dashboard and audit log access only
#   devops        — No application routes; infrastructure access only
#
# WARNING: At minimum, change the admin password before first use.
#          You may also add, remove, or modify user entries as needed.

